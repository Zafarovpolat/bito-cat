<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vetka Batch — Сравнение</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap');
:root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--border-b:#2e2e2e;--text:#e8e8e8;--muted:#555;--orig:#ff5c3a;--gen:#3adfff;--orig-dim:rgba(255,92,58,.10);--gen-dim:rgba(58,223,255,.10);--r:4px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.logo span{color:var(--gen)}
.meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-left:auto}
.chip{border:1px solid var(--border-b);background:var(--surface);border-radius:var(--r);padding:5px 12px;font-size:11px;color:var(--muted)}.chip b{color:var(--text)}.chip.o{border-color:var(--orig)}.chip.g{border-color:var(--gen)}
.zoom-wrap{display:flex;align-items:center;gap:2px;border:1px solid var(--border-b);border-radius:var(--r);padding:0 4px;height:30px}
.zbtn{background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;width:24px;height:24px;display:grid;place-items:center;border-radius:2px;transition:background .15s}.zbtn:hover{background:var(--border-b)}
.zlbl{color:var(--muted);font-size:11px;min-width:38px;text-align:center}
.filter-wrap{display:flex;gap:6px;align-items:center}
.fbtn{background:var(--surface);border:1px solid var(--border-b);color:var(--muted);border-radius:var(--r);padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}.fbtn.active{color:var(--text);border-color:var(--text)}
.col-labels{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:10px 28px 0}
.clbl{display:flex;align-items:center;gap:8px;padding:7px 14px;font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border-radius:var(--r) var(--r) 0 0}
.clbl.o{background:var(--orig-dim);color:var(--orig)}.clbl.g{background:var(--gen-dim);color:var(--gen)}
#grid{display:flex;flex-direction:column;gap:2px;padding:2px 28px 80px}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:var(--r);overflow:hidden;position:relative;opacity:0;transform:translateY(6px);animation:up .28s ease forwards}
@keyframes up{to{opacity:1;transform:none}}
.pair-num{position:absolute;top:7px;left:8px;z-index:2;background:rgba(0,0,0,.65);color:var(--muted);font-size:9px;padding:2px 6px;border-radius:2px;pointer-events:none}
.cell{position:relative;overflow:hidden;background:var(--surface);cursor:zoom-in}
.cell:first-child{border-left:2px solid var(--orig)}.cell:last-child{border-right:2px solid var(--gen)}
.cell img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .22s ease}.cell:hover img{transform:scale(1.025)}
.ftag{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.72);color:var(--muted);font-size:9px;padding:2px 6px;border-radius:2px;max-width:calc(100% - 10px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.missing{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;background:repeating-linear-gradient(45deg,var(--surface),var(--surface) 6px,var(--bg) 6px,var(--bg) 12px)}
#lb{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.93);backdrop-filter:blur(10px);cursor:zoom-out}
#lb.on{display:grid;place-items:center}
#lb-inner{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:96vw;height:93vh;padding:14px}
.lbp{display:flex;flex-direction:column;gap:6px;height:100%;overflow:hidden}
.lblbl{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:0 2px}
.lblbl.o{color:var(--orig)}.lblbl.g{color:var(--gen)}
.lbp img{flex:1;width:100%;height:calc(100% - 26px);object-fit:contain;border-radius:2px}
#lb-x{position:absolute;top:14px;right:18px;background:none;border:1px solid var(--border-b);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;display:grid;place-items:center;transition:background .15s}#lb-x:hover{background:var(--border-b)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:2px}

.family-bar{position:sticky;top:56px;z-index:99;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);display:flex;gap:5px;align-items:center;padding:8px 28px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border-b) transparent}
.family-bar::-webkit-scrollbar{height:3px}.family-bar::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:2px}
.family-bar-label{color:var(--muted);font-size:10px;white-space:nowrap;margin-right:4px;flex-shrink:0}
.ffbtn{background:var(--surface);border:1px solid var(--border-b);color:var(--muted);border-radius:var(--r);padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ffbtn:hover{border-color:var(--gen);color:var(--text)}
.ffbtn.active{color:var(--bg);background:var(--gen);border-color:var(--gen)}
</style>
</head>
<body>
<header>
  <div class="logo">vetka<span>.</span>batch</div>
  <div class="meta">
    <div class="chip o">● Оригинал <b>276</b></div>
    <div class="chip g">● Генерация <b>276</b></div>
    <div class="chip">Совпадений: <b>276</b></div>
    <div class="filter-wrap">
      <button class="fbtn active" onclick="setFilter('all',this)">Все</button>
      <button class="fbtn" onclick="setFilter('matched',this)">Пары</button>
      <button class="fbtn" onclick="setFilter('only_orig',this)">Без gen</button>
      <button class="fbtn" onclick="setFilter('only_gen',this)">Без orig</button>
    </div>
    <div class="zoom-wrap">
      <button class="zbtn" onclick="zoom(-60)">−</button>
      <span class="zlbl" id="zlbl">300px</span>
      <button class="zbtn" onclick="zoom(+60)">+</button>
    </div>
  </div>
</header>
<div class="family-bar" id="family-bar">
  <span class="family-bar-label">Серия:</span>
</div>
<div class="col-labels">
  <div class="clbl o">● Оригинал</div>
  <div class="clbl g">● Генерация / Edited</div>
</div>
<div id="grid"></div>
<div id="lb">
  <button id="lb-x" onclick="closeLb()">✕</button>
  <div id="lb-inner">
    <div class="lbp"><div class="lblbl o" id="lb-on"></div><img id="lb-oi" alt="orig"></div>
    <div class="lbp"><div class="lblbl g" id="lb-gn"></div><img id="lb-gi" alt="gen"></div>
  </div>
</div>

let H=300,F='all',FAM=null;
const grid=document.getElementById('grid'),lb=document.getElementById('lb');

function getFamily(name){
  const parts=name.split('-');
  const mid=parts.slice(1,-1);
  if(!mid.length)return parts[1]?.toUpperCase()||name;
  const first=mid[0].toUpperCase();
  const second=mid[1];
  if(second&&/^\d+$/.test(second))return first+'-'+second;
  return first;
}

function buildFamilyFilters(){
  const counts={};
  PAIRS.forEach(p=>{const f=getFamily(p.name);counts[f]=(counts[f]||0)+1;});
  const multi=Object.entries(counts).filter(([,v])=>v>1).map(([k])=>k).sort((a,b)=>a.localeCompare(b));
  const bar=document.getElementById('family-bar');
  multi.forEach(f=>{
    const b=document.createElement('button');
    b.className='ffbtn';b.textContent=f;
    b.onclick=()=>setFamily(f,b);
    bar.appendChild(b);
  });
}

function setFamily(f,btn){
  if(FAM===f){FAM=null;document.querySelectorAll('.ffbtn').forEach(b=>b.classList.remove('active'));}
  else{FAM=f;document.querySelectorAll('.ffbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  render();
}

function fp(){
  let pairs=PAIRS;
  if(F==='matched')pairs=pairs.filter(p=>p.orig&&p.gen);
  else if(F==='only_orig')pairs=pairs.filter(p=>p.orig&&!p.gen);
  else if(F==='only_gen')pairs=pairs.filter(p=>!p.orig&&p.gen);
  if(FAM)pairs=pairs.filter(p=>getFamily(p.name)===FAM);
  return pairs;
}
function setFilter(f,btn){F=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function render(){grid.innerHTML='';fp().forEach((p,i)=>{const d=document.createElement('div');d.className='pair';d.style.animationDelay=Math.min(i*12,500)+'ms';const n=document.createElement('div');n.className='pair-num';n.textContent=String(i+1).padStart(3,'0');d.appendChild(n);d.appendChild(cell(p.orig,p.name));d.appendChild(cell(p.gen,p.name));d.addEventListener('click',()=>lb_open(p));grid.appendChild(d);});applyH();}
function cell(src,name){const c=document.createElement('div');c.className='cell';c.style.height=H+'px';if(src){const img=document.createElement('img');img.src=src;img.alt=name;img.loading='lazy';c.appendChild(img);const t=document.createElement('div');t.className='ftag';t.textContent=src.split('/').pop();c.appendChild(t);}else{const m=document.createElement('div');m.className='missing';m.style.height=H+'px';m.textContent='— отсутствует —';c.appendChild(m);}return c;}
function applyH(){document.querySelectorAll('.cell,.missing').forEach(c=>c.style.height=H+'px');document.getElementById('zlbl').textContent=H+'px';}
function zoom(d){H=Math.max(100,Math.min(900,H+d));applyH();}
function lb_open(p){document.getElementById('lb-oi').src=p.orig||'';document.getElementById('lb-gi').src=p.gen||'';document.getElementById('lb-on').textContent='● ОРИГИНАЛ — '+p.name;document.getElementById('lb-gn').textContent='● ГЕНЕРАЦИЯ — '+p.name;lb.classList.add('on');}
function closeLb(){lb.classList.remove('on');}
lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
buildFamilyFilters();
render();
</script>
